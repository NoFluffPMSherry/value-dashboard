<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PartsCheck Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;font-family:'Segoe UI',Arial,sans-serif}
  body{background:#f0f0f0}
  input,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const G = {
  green:"#2B8A3E", greenDark:"#1E6B2F", greenLight:"#E8F5E9",
  amber:"#E07A00", amberLight:"#FFF8E1",
  red:"#C0392B", redLight:"#FFEBEE",
  gray50:"#F0F0F0", gray100:"#E8E8E8", gray200:"#DDDDDD",
  gray400:"#AAAAAA", gray500:"#888888", gray600:"#555555", gray800:"#333333",
};

const s = {
  shell:{ display:"flex", flexDirection:"column", background:G.gray50, minHeight:"100vh", fontSize:13 },
  topnav:{ background:G.green, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 16px", height:60, flexShrink:0 },
  logoCheck:{ background:"#fff", color:G.green, fontSize:14, fontWeight:900, width:30, height:28, borderRadius:3, display:"flex", alignItems:"center", justifyContent:"center" },
  subnav:{ background:"#333", display:"flex", alignItems:"stretch", flexShrink:0 },
  body:{ flex:1, display:"grid", gridTemplateColumns:"340px 1fr", overflow:"auto", minHeight:0 },
  left:{ background:"#fff", borderRight:"1px solid "+G.gray200, overflowY:"auto" },
  actionRow:{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", borderBottom:"1px solid "+G.gray100, gap:8 },
  btnGreen:{ background:G.green, color:"#fff", border:"none", borderRadius:2, fontSize:11, fontWeight:700, padding:"5px 12px", cursor:"pointer", whiteSpace:"nowrap" },
  right:{ padding:"10px 12px", display:"flex", flexDirection:"column", gap:8, background:G.gray50, overflowY:"auto" },
  monthPanel:{ background:"#fff", border:"1px solid "+G.gray200, overflow:"visible" },
  monthHeader:{ background:G.green, color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 14px" },
  kpiRow:{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", position:"relative", zIndex:10 },
  kpiCell:{ padding:"9px 12px", borderRight:"1px solid "+G.gray100, cursor:"pointer", position:"relative", overflow:"visible" },
  widgetRow:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 },
  widget:{ background:"#fff", border:"1px solid "+G.gray200, display:"flex", flexDirection:"column" },
  widgetHead:{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 12px", borderBottom:"1px solid #eee", flexShrink:0 },
  widgetBody:{ padding:"8px 12px", flex:1 },
  widgetFooter:{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 12px", borderTop:"1px solid #eee", flexShrink:0 },
};

function NavIcon({ label, d }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, cursor:"pointer", opacity:.85 }}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d={d}/>
      </svg>
      <span style={{ color:"#fff", fontSize:9, fontWeight:700, letterSpacing:.5 }}>{label}</span>
    </div>
  );
}

function ActionRow({ label, btn, hasInput }) {
  return (
    <div style={s.actionRow}>
      <span style={{ fontSize:12, color:"#444", flex:1 }}>{label}</span>
      <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
        {hasInput && <input placeholder="Enter Quote #" style={{ border:"1px solid "+G.gray200, borderRadius:2, fontSize:11, padding:"4px 7px", width:95, color:G.gray600, outline:"none" }}/>}
        <button style={s.btnGreen}
          onMouseEnter={e => e.currentTarget.style.background=G.greenDark}
          onMouseLeave={e => e.currentTarget.style.background=G.green}>{btn}</button>
      </div>
    </div>
  );
}

function TrendTooltip({ data, color, name }) {
  const vals = data.map(d => d.value);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const W=140, H=44, pX=8, pY=6;
  const pts = vals.map((v,i) => {
    const x = pX + (i/(vals.length-1))*(W-pX*2);
    const y = pY + (1-(v-minV)/range)*(H-pY*2);
    return x.toFixed(1)+","+y.toFixed(1);
  });
  const gId = "g"+name.split(" ").join("");
  const aD = "M"+pts[0]+" "+pts.slice(1).map(p=>"L"+p).join(" ")+
    " L"+(pX+W-pX*2).toFixed(1)+","+(H-pY+4).toFixed(1)+
    " L"+pX+","+(H-pY+4).toFixed(1)+" Z";
  return (
    <div style={{ position:"absolute", top:"calc(100% + 4px)", left:"50%", transform:"translateX(-50%)",
      background:"#fff", border:"1px solid "+G.gray200, borderRadius:5, padding:"10px 12px",
      zIndex:200, boxShadow:"0 4px 18px rgba(0,0,0,.13)", minWidth:164, pointerEvents:"none" }}>
      <div style={{ position:"absolute", bottom:"100%", left:"50%", transform:"translateX(-50%)", width:0, height:0,
        borderLeft:"5px solid transparent", borderRight:"5px solid transparent", borderBottom:"5px solid "+G.gray200 }}/>
      <div style={{ position:"absolute", bottom:"calc(100% - 1px)", left:"50%", transform:"translateX(-50%)", width:0, height:0,
        borderLeft:"5px solid transparent", borderRight:"5px solid transparent", borderBottom:"5px solid #fff" }}/>
      <div style={{ fontSize:9, color:G.gray400, fontWeight:700, letterSpacing:.5, textTransform:"uppercase", marginBottom:8 }}>
        {name} - 4 month trend
      </div>
      <svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{ display:"block", overflow:"visible" }}>
        <defs>
          <linearGradient id={gId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={aD} fill={"url(#"+gId+")"}/>
        <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i) => {
          const [cx,cy] = p.split(",").map(Number);
          const cur = i===pts.length-1;
          return <circle key={i} cx={cx} cy={cy} r={cur?3:2} fill={cur?color:"#fff"} stroke={color} strokeWidth="1.5"/>;
        })}
      </svg>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        {data.map((d,i) => (
          <div key={i} style={{ fontSize:9, color:i===data.length-1?color:G.gray400, fontWeight:i===data.length-1?700:400, textAlign:"center" }}>
            {d.month}
          </div>
        ))}
      </div>
      <div style={{ marginTop:7, paddingTop:7, borderTop:"1px solid "+G.gray100, fontSize:10, color:G.gray800, fontWeight:700 }}>
        {data[data.length-1].label}
        <span style={{ fontSize:9, color:G.gray400, fontWeight:400, marginLeft:4 }}>current</span>
      </div>
    </div>
  );
}

function KpiCell({ icon, name, value, sub, trendVal, trendDir, trendNote, barData, last }) {
  const [hov, setHov] = useState(false);
  const trendColor = trendDir==="up"?G.green:trendDir==="warn"?G.amber:trendDir==="down"?G.red:G.gray400;
  const arrow = trendDir==="down"?"▼":trendDir==="neutral"?"":"▲";
  const barColor = trendDir==="warn"?G.amber:trendDir==="down"?G.red:G.green;
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ ...s.kpiCell, borderRight:last?"none":"1px solid "+G.gray100, background:hov?"#fafafa":"#fff" }}>
      {hov && barData && <TrendTooltip data={barData} color={barColor} name={name}/>}
      <div style={{ color:G.gray400, marginBottom:3 }}>{icon}</div>
      <div style={{ fontSize:10, color:G.gray500, fontWeight:700, letterSpacing:.5, textTransform:"uppercase", marginBottom:3 }}>{name}</div>
      <div style={{ fontSize:20, fontWeight:700, color:trendDir==="warn"?G.amber:G.green, lineHeight:1.1 }}>{value}</div>
      <div style={{ fontSize:10, color:G.gray600, marginTop:2 }}>{sub}</div>
      <div style={{ fontSize:10, color:G.gray600, marginTop:4 }}>
        {trendDir==="neutral"
          ? <em style={{ color:G.gray400 }}>{trendNote}</em>
          : <span><span style={{ color:trendColor, fontWeight:700 }}>{arrow} {trendVal}</span> {trendNote}</span>
        }
      </div>
    </div>
  );
}

function TargetBar({ label, actual, target, unit, higherIsBetter }) {
  const isGood = higherIsBetter ? actual>=target : actual<=target;
  const isWarn = higherIsBetter ? (actual>=target*0.85 && actual<target) : (actual<=target*1.25 && actual>target);
  const color = isGood?G.green:isWarn?G.amber:G.red;
  const max = Math.max(actual,target)*(higherIsBetter?1.15:1.3);
  const aPct = Math.min((actual/max)*100,100);
  const tPct = Math.min((target/max)*100,100);
  const fmt = v => unit==="$" ? "$"+v.toLocaleString() : v+"%";
  return (
    <div style={{ marginBottom:7 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
        <span style={{ fontSize:10, color:G.gray600 }}>{label}</span>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ fontSize:10, fontWeight:700, color }}>{fmt(actual)}</span>
          <span style={{ fontSize:9, color:G.gray400 }}>target {fmt(target)}</span>
        </div>
      </div>
      <div style={{ position:"relative", height:6, background:G.gray100, borderRadius:3 }}>
        <div style={{ position:"absolute", left:0, top:0, height:"100%", width:aPct+"%", background:color, borderRadius:3 }}/>
        <div style={{ position:"absolute", top:-3, bottom:-3, left:tPct+"%", width:2, background:"#999", borderRadius:1, transform:"translateX(-50%)" }}/>
      </div>
    </div>
  );
}

function MixBar() {
  const [anim, setAnim] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const ob = new IntersectionObserver(([e]) => { if(e.isIntersecting) setTimeout(()=>setAnim(true),200); },{threshold:0.2});
    if(ref.current) ob.observe(ref.current);
    return ()=>ob.disconnect();
  },[]);
  const segs=[{pct:52,color:"#3b82f6",label:"OEM"},{pct:31,color:"#8b5cf6",label:"Aftermarket"},{pct:17,color:"#81C051",label:"Used"}];
  return (
    <div ref={ref}>
      <div style={{ display:"flex", height:8, borderRadius:2, overflow:"hidden", gap:1, margin:"4px 0" }}>
        {segs.map((seg,i)=>(
          <div key={i} style={{ height:"100%", width:anim?seg.pct+"%":"0%", background:seg.color,
            borderRadius:i===0?"2px 0 0 2px":i===segs.length-1?"0 2px 2px 0":0,
            transition:"width 1s cubic-bezier(.4,0,.2,1) "+(i*0.12)+"s" }}/>
        ))}
      </div>
      <div style={{ display:"flex", gap:10, marginTop:4, flexWrap:"wrap" }}>
        {segs.map((seg,i)=>(
          <div key={i} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:G.gray600 }}>
            <div style={{ width:8, height:8, borderRadius:1, background:seg.color, flexShrink:0 }}/>
            {seg.label} <strong style={{ color:seg.color }}>{seg.pct}%</strong>
          </div>
        ))}
      </div>
    </div>
  );
}

function Badge({ text, bg, color }) {
  return <span style={{ background:bg, color, fontSize:9, fontWeight:700, padding:"2px 7px", borderRadius:2 }}>{text}</span>;
}

function StatRow({ label, val }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"4px 0", borderBottom:"1px solid "+G.gray100 }}>
      <span style={{ color:G.gray600 }}>{label}</span>
      <span style={{ fontWeight:700, color:G.gray800 }}>{val}</span>
    </div>
  );
}

function Dashboard() {
  const [nav, setNav] = useState("DASHBOARD");
  const subNavs = ["DASHBOARD","REPORTING","KNOWLEDGE CENTRE","SETTINGS"];
  const docIcon = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>;
  const boxIcon = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>;
  const dollarIcon = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>;
  const pulseIcon = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
  const clockIcon = <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

  return (
    <div style={s.shell}>

      {/* TOP NAV */}
      <div style={s.topnav}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={s.logoCheck}>&#10003;</div>
          <div>
            <div style={{ color:"#fff", fontSize:16, fontWeight:700, letterSpacing:.5 }}>PARTSCHECK</div>
            <div style={{ color:"rgba(255,255,255,.6)", fontSize:8, letterSpacing:.5 }}>Smart. Simple. Streamlined.</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:20 }}>
          <NavIcon label="DASHBOARD" d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"/>
          <NavIcon label="GET PRICE" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
          <NavIcon label="CHECK PRICE" d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          <NavIcon label="ORDERS" d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
          <NavIcon label="CREDITS" d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer" }}>
            <div style={{ background:G.greenDark, color:"#fff", fontSize:10, fontWeight:800, width:24, height:22, borderRadius:2, display:"flex", alignItems:"center", justifyContent:"center" }}>MJ</div>
            MY PARTSCHECK
          </div>
          <span style={{ color:"rgba(255,255,255,.4)" }}>|</span>
          <span style={{ color:"#fff", fontSize:11, cursor:"pointer" }}>LOGOUT</span>
          <div style={{ display:"flex", alignItems:"center", background:"#fff", borderRadius:2, overflow:"hidden", marginLeft:4 }}>
            <input placeholder="Search" style={{ border:"none", outline:"none", fontSize:12, padding:"5px 8px", width:130, color:"#333" }}/>
            <button style={{ background:"#fff", border:"none", padding:"5px 8px", cursor:"pointer", color:G.gray600, fontSize:13 }}>&#128269;</button>
          </div>
        </div>
      </div>

      {/* SUB NAV */}
      <div style={s.subnav}>
        {subNavs.map(n=>(
          <button key={n} onClick={()=>setNav(n)} style={{
            background:"none", border:"none", borderBottom:"2px solid "+(nav===n?G.green:"transparent"),
            color:nav===n?"#fff":"rgba(255,255,255,.55)", fontSize:11, fontWeight:600,
            padding:"0 22px", height:38, cursor:"pointer", letterSpacing:.3
          }}>{n}</button>
        ))}
      </div>

      {/* BODY */}
      <div style={s.body}>

        {/* LEFT */}
        <div style={s.left}>
          <ActionRow label="Send quotes to Suppliers" btn="SEND QUOTES"/>
          <ActionRow label="Check quotes from Suppliers" btn="CHECK QUOTES"/>
          <ActionRow label="Order Parts" btn="SEARCH" hasInput/>
          <ActionRow label="Receipt Parts" btn="SEARCH" hasInput/>
          <ActionRow label="Raise a Credit Return" btn="SEARCH" hasInput/>
          <ActionRow label="Order Supplementary Parts" btn="SEARCH" hasInput/>
          <ActionRow label="Manage Backorders and ETA's" btn="BACKORDERS"/>
        </div>

        {/* RIGHT */}
        <div style={s.right}>

          {/* MTD PANEL */}
          <div style={s.monthPanel}>
            <div style={s.monthHeader}>
              <span style={{ fontSize:12, fontWeight:700, letterSpacing:.5 }}>MONTH TO DATE IN NUMBERS</span>
              <span style={{ background:"#fff", color:G.green, fontSize:10, fontWeight:700, padding:"2px 10px", borderRadius:2 }}>APR 2026</span>
            </div>
            <div style={{ fontSize:11, color:G.gray500, padding:"5px 14px 6px", borderBottom:"1px solid "+G.gray100 }}>
              A snapshot of how PartsCheck is powering your business this month
            </div>
            <div style={s.kpiRow}>
              <KpiCell icon={docIcon} name="Quotes Converted" value="68%" sub="89 of 131 quotes"
                trendVal="+4pts" trendDir="up" trendNote="vs same period last mo."
                barData={[{month:"Jan",value:61},{month:"Feb",value:63},{month:"Mar",value:64},{month:"Apr",value:68,label:"68%"}]}/>
              <KpiCell icon={boxIcon} name="Parts Ordered" value="412" sub="from 89 jobs"
                trendVal="+8%" trendDir="up" trendNote="vs same period last mo."
                barData={[{month:"Jan",value:361},{month:"Feb",value:378},{month:"Mar",value:381},{month:"Apr",value:412,label:"412"}]}/>
              <KpiCell icon={dollarIcon} name="Total Spend" value="$74.2K" sub="$834 avg per job"
                trendVal="+12%" trendDir="warn" trendNote="vs same period last mo."
                barData={[{month:"Jan",value:61},{month:"Feb",value:63},{month:"Mar",value:66},{month:"Apr",value:74.2,label:"$74.2K"}]}/>
              <KpiCell icon={pulseIcon} name="Gross Profit" value="$18.4K" sub="24.8% margin"
                trendVal="+1.2pts" trendDir="up" trendNote="margin vs last mo."
                barData={[{month:"Jan",value:15.1},{month:"Feb",value:16.2},{month:"Mar",value:17.4},{month:"Apr",value:18.4,label:"$18.4K"}]}/>
              <KpiCell icon={clockIcon} name="Hours Saved" value="140 hrs" sub="Quote and admin time saved"
                trendDir="neutral" trendNote="Estimated based on avg workflow" last/>
            </div>
          </div>

          {/* WIDGETS */}
          <div style={s.widgetRow}>

            {/* Part Type Mix */}
            <div style={s.widget}>
              <div style={s.widgetHead}>
                <span style={{ fontSize:12, fontWeight:700, color:G.gray800 }}>PART TYPE MIX</span>
                <Badge text="APR 2026" bg="#3b82f6" color="#fff"/>
              </div>
              <div style={s.widgetBody}>
                <MixBar/>
                <div style={{ marginTop:10 }}>
                  {[{label:"OEM",pct:52,color:"#3b82f6",count:214},{label:"Aftermarket",pct:31,color:"#8b5cf6",count:128},{label:"Used",pct:17,color:"#81C051",count:70}].map((row,i)=>(
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"4px 0", borderBottom:"1px solid "+G.gray100 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <div style={{ width:8, height:8, borderRadius:1, background:row.color, flexShrink:0 }}/>
                        <span style={{ color:G.gray600 }}>{row.label}</span>
                      </div>
                      <div style={{ display:"flex", gap:12 }}>
                        <span style={{ color:G.gray500, fontSize:10 }}>{row.count} parts</span>
                        <span style={{ fontWeight:700, color:row.color, minWidth:28, textAlign:"right" }}>{row.pct}%</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={s.widgetFooter}>
                <span style={{ fontSize:11, color:G.gray500 }}>412 parts ordered this month</span>
                <span style={{ fontSize:11, color:G.green, fontWeight:600, cursor:"pointer" }}>View Detail</span>
              </div>
            </div>

            {/* Missed Savings */}
            <div style={s.widget}>
              <div style={s.widgetHead}>
                <span style={{ fontSize:12, fontWeight:700, color:G.gray800 }}>MISSED SAVINGS</span>
                <Badge text="UP THIS MONTH" bg={G.redLight} color={G.red}/>
              </div>
              <div style={s.widgetBody}>
                <div style={{ fontSize:24, fontWeight:700, color:G.red, lineHeight:1 }}>$4,320</div>
                <div style={{ fontSize:10, color:G.gray600, marginTop:3, marginBottom:8 }}>above best available price this month</div>
                <div style={{ display:"inline-flex", background:G.redLight, color:G.red, fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:2, marginBottom:10 }}>
                  +18% vs last month
                </div>
                <div style={{ borderTop:"1px solid "+G.gray100, paddingTop:8 }}>
                  <StatRow label="Parts reviewed" val="412"/>
                  <StatRow label="Lines above best price" val="124"/>
                  <StatRow label="Avg overspend per part" val="+$18"/>
                  <StatRow label="Largest single overspend" val="$142"/>
                </div>
              </div>
              <div style={s.widgetFooter}>
                <span style={{ fontSize:11, color:G.gray500 }}>Opportunity to reduce parts spend</span>
                <span style={{ fontSize:11, color:G.green, fontWeight:600, cursor:"pointer" }}>Review selections</span>
              </div>
            </div>

            {/* Insurer Compliance */}
            <div style={s.widget}>
              <div style={s.widgetHead}>
                <span style={{ fontSize:12, fontWeight:700, color:G.gray800 }}>INSURER COMPLIANCE</span>
                <Badge text="3 OFF TARGET" bg={G.redLight} color={G.red}/>
              </div>
              <div style={s.widgetBody}>
                <TargetBar label="OEM Mix" actual={52} target={65} unit="%" higherIsBetter={true}/>
                <TargetBar label="OEM Discount" actual={28.5} target={32.0} unit="%" higherIsBetter={true}/>
                <TargetBar label="Parallel Mix" actual={17} target={26.0} unit="%" higherIsBetter={true}/>
                <TargetBar label="Aftermarket Mix" actual={31} target={5.0} unit="%" higherIsBetter={false}/>
                <TargetBar label="Avg Parts Basket" actual={834} target={500} unit="$" higherIsBetter={false}/>
